<!DOCTYPE html>
<html lang="en" data-theme="light" data-lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-en="Login — Agora" data-ru="Вход — Agora">Login — Agora</title>
  <script>
    (function () {
      var t = localStorage.getItem("agora-theme");
      if (t !== "light" && t !== "dark") t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      var l = localStorage.getItem("agora-lang");
      if (l !== "en" && l !== "ru") l = (navigator.language || "en").toLowerCase().indexOf("ru") === 0 ? "ru" : "en";
      var r = document.documentElement; r.setAttribute("data-theme", t); r.setAttribute("data-lang", l); r.lang = l;
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/pages.css" />
  <script>window.AGORA = { active: "" };</script>
</head>
<body>
  <a class="skip-link" href="#main" data-en="Skip to content" data-ru="Перейти к содержимому">Skip to content</a>
  <div id="site-header"></div>

  <main id="main"><div class="container"><div class="auth-wrap">
    <div class="card auth-card">
      <h1 data-en="Login" data-ru="Вход">Login</h1>

      <div class="notice notice--danger" id="login-error" hidden style="margin-bottom:var(--sp-4)">
        <span data-icon="alert"></span>
        <span data-en="Error: Login failed. Either the username does not exist, or the password is wrong."
              data-ru="Ошибка: вход не выполнен. Либо имя не существует, либо пароль неверный.">Error: Login failed. Either the username does not exist, or the password is wrong.</span>
      </div>

      <form id="login-form" novalidate>
        <div class="field">
          <label class="label" for="l-username" data-en="Username" data-ru="Имя пользователя">Username</label>
          <input class="input" id="l-username" name="username" autocomplete="username" />
        </div>
        <div class="field">
          <label class="label" for="l-password" data-en="Password" data-ru="Пароль">Password</label>
          <div class="input-group">
            <input class="input" id="l-password" name="password" type="password" autocomplete="current-password" />
            <button type="button" class="input-group__btn" data-toggle-password="l-password" data-en-aria="Show password" data-ru-aria="Показать пароль"><span data-icon="eye"></span></button>
          </div>
        </div>
        <div class="field">
          <label class="captcha">
            <input type="checkbox" id="l-captcha" />
            <span class="box"></span>
            <span data-en="I am not a robot" data-ru="Я не робот">I am not a robot</span>
          </label>
        </div>
        <button class="btn btn--primary btn--block btn--lg" type="submit" data-en="Log in" data-ru="Войти">Log in</button>
      </form>

      <p class="auth-alt">
        <span data-en="Do you have no account yet?" data-ru="Ещё нет аккаунта?">Do you have no account yet?</span>
        <a href="register.html" data-en="Sign up" data-ru="Зарегистрироваться">Sign up</a>
      </p>
      <p class="auth-alt text-xs subtle" data-en="Demo account — username: sofia · password: password123" data-ru="Демо-аккаунт — логин: sofia · пароль: password123">Demo account — username: sofia · password: password123</p>
    </div>
  </div></div></main>

  <div id="site-footer"></div>
  <script src="assets/js/store.js"></script>
  <script>
    window.agoraPage = function () {
      var form = document.getElementById("login-form");
      var err = document.getElementById("login-error");
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        err.hidden = true;
        var res = Store.login(document.getElementById("l-username").value, document.getElementById("l-password").value);
        if (!res.ok) { err.hidden = false; return; }
        var next = Agora.qs("next");
        location.href = next && /^[a-z0-9\-]+\.html/i.test(next) ? next : "index.html";
      });
    };
  </script>
  <script src="assets/js/app.js"></script>
</body>
</html>
