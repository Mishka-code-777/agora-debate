<!DOCTYPE html>
<html lang="en" data-theme="light" data-lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-en="Debates — Agora" data-ru="Дебаты — Agora">Debates — Agora</title>
  <script>
    (function () {
      var t = localStorage.getItem("agora-theme");
      if (t !== "light" && t !== "dark") t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      var l = localStorage.getItem("agora-lang");
      if (l !== "en" && l !== "ru") l = (navigator.language || "en").toLowerCase().indexOf("ru") === 0 ? "ru" : "en";
      var r = document.documentElement; r.setAttribute("data-theme", t); r.setAttribute("data-lang", l); r.lang = l;
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/pages.css" />
  <script>window.AGORA = { active: "debates" };</script>
</head>
<body>
  <a class="skip-link" href="#main" data-en="Skip to content" data-ru="Перейти к содержимому">Skip to content</a>
  <div id="site-header"></div>

  <main id="main" class="page"><div class="container">
    <div class="list-head">
      <div>
        <h1 data-en="Debates" data-ru="Дебаты">Debates</h1>
        <p class="list-count" id="debate-count"></p>
      </div>
    </div>

    <div class="toolbar">
      <div class="search">
        <span data-icon="search"></span>
        <input class="input" id="debate-search" type="search" data-en-ph="Search debates by topic…" data-ru-ph="Поиск дебатов по теме…" />
      </div>

      <div class="dropdown">
        <button class="btn btn--ghost sort-btn" data-dropdown-toggle aria-expanded="false">
          <span data-icon="sort"></span>
          <span id="sort-label" data-en="Newest first" data-ru="Сначала новые">Newest first</span>
          <span data-icon="chevron"></span>
        </button>
        <div class="dropdown__menu" hidden role="listbox">
          <div class="dropdown__label" data-en="Sort by" data-ru="Сортировка">Sort by</div>
          <button class="dropdown__item" data-sort="pub-new" aria-checked="true"><span data-en="Publication date — newest first" data-ru="Дата публикации — сначала новые">Publication date — newest first</span></button>
          <button class="dropdown__item" data-sort="pub-old"><span data-en="Publication date — oldest first" data-ru="Дата публикации — сначала старые">Publication date — oldest first</span></button>
          <div class="dropdown__sep"></div>
          <button class="dropdown__item" data-sort="held-early"><span data-en="Date held — earliest first" data-ru="Дата проведения — сначала ближайшие">Date held — earliest first</span></button>
          <button class="dropdown__item" data-sort="held-late"><span data-en="Date held — latest first" data-ru="Дата проведения — сначала поздние">Date held — latest first</span></button>
          <div class="dropdown__sep"></div>
          <button class="dropdown__item" data-sort="name-az"><span data-en="Name — A to Z" data-ru="Название — А→Я">Name — A to Z</span></button>
          <button class="dropdown__item" data-sort="name-za"><span data-en="Name — Z to A" data-ru="Название — Я→А">Name — Z to A</span></button>
        </div>
      </div>

      <button class="btn btn--ghost" data-toggle="filters" data-target="filters-panel" aria-expanded="false" aria-controls="filters-panel">
        <span data-icon="sliders"></span>
        <span data-en="Filters" data-ru="Фильтры">Filters</span>
        <span class="badge badge--primary badge--no-dot" id="filter-count" hidden>0</span>
      </button>
    </div>

    <div class="applied-filters" id="applied-filters" hidden>
      <div class="filter-chips" id="filter-chips"></div>
      <button class="btn btn--link" id="clear-filters" data-en="Clear all applied filters" data-ru="Сбросить все фильтры">Clear all applied filters</button>
    </div>

    <section class="filters-panel" id="filters-panel" hidden aria-label="Filters">
      <div class="filters-panel__grid">
        <div class="filter-group">
          <p class="filter-group__title" data-en="Published by" data-ru="Опубликовано пользователем">Published by</p>
          <div class="pub-rows" id="pub-rows"></div>
          <p class="field-hint" data-en="A new row appears when you fill the last one." data-ru="Новая строка появляется, когда заполнена последняя.">A new row appears when you fill the last one.</p>
        </div>
        <div class="filter-group">
          <p class="filter-group__title" data-en="Debate status" data-ru="Статус дебата">Debate status</p>
          <div class="status-checklist">
            <label class="choice"><input type="checkbox" value="ongoing" class="js-status" /><span data-en="Ongoing" data-ru="Идёт сейчас">Ongoing</span></label>
            <label class="choice"><input type="checkbox" value="looking" class="js-status" /><span data-en="Looking for participants" data-ru="Ищем участников">Looking for participants</span></label>
            <label class="choice"><input type="checkbox" value="awaiting" class="js-status" /><span data-en="Awaiting" data-ru="Ожидание">Awaiting</span></label>
            <label class="choice"><input type="checkbox" value="cancelled" class="js-status" /><span data-en="Cancelled" data-ru="Отменён">Cancelled</span></label>
          </div>
        </div>
      </div>
      <div class="filters-panel__foot">
        <button class="btn btn--ghost" data-toggle="filters" data-target="filters-panel" data-en="Cancel" data-ru="Отмена">Cancel</button>
        <button class="btn btn--primary" id="apply-filters" data-en="Apply filters" data-ru="Применить фильтры">Apply filters</button>
      </div>
    </section>

    <div class="list" id="debate-list"></div>
  </div></main>

  <div id="site-footer"></div>
  <script src="assets/js/store.js"></script>
  <script>
    window.agoraPage = function () {
      var state = { query: "", sort: "pub-new", publishedBy: [], statuses: [] };

      function emptyState() {
        return (
          '<div class="empty-state"><span data-icon="search"></span>' +
          '<h3 data-en="No debates match your filters" data-ru="Ничего не найдено">No debates match your filters</h3>' +
          '<p data-en="Try clearing filters or changing your search." data-ru="Попробуйте сбросить фильтры или изменить запрос.">Try clearing filters or changing your search.</p></div>'
        );
      }

      function renderChips() {
        var chips = [];
        state.statuses.forEach(function (s) {
          var m = Agora.statusMeta(s);
          chips.push('<span class="filter-chip"><span data-en="Status: ' + m.en + '" data-ru="Статус: ' + m.ru + '">Status: ' + m.en +
            '</span><button data-chip-status="' + s + '" data-en-aria="Remove" data-ru-aria="Убрать" data-icon="x"></button></span>');
        });
        state.publishedBy.forEach(function (n) {
          chips.push('<span class="filter-chip"><span data-en="Published by: ' + n + '" data-ru="Автор: ' + n +
            '">Published by: ' + n + '</span><button data-chip-pub="' + n + '" data-en-aria="Remove" data-ru-aria="Убрать" data-icon="x"></button></span>');
        });
        document.getElementById("filter-chips").innerHTML = chips.join("");
        document.getElementById("applied-filters").hidden = chips.length === 0;
        var n = state.statuses.length + state.publishedBy.length;
        var fc = document.getElementById("filter-count");
        fc.hidden = n === 0; fc.textContent = n;
      }

      function render() {
        var list = Store.getDebates(state);
        var wrap = document.getElementById("debate-list");
        wrap.innerHTML = list.length ? list.map(Agora.debateCardHTML).join("") : emptyState();
        var c = document.getElementById("debate-count");
        c.setAttribute("data-en", "Showing " + list.length + (list.length === 1 ? " debate" : " debates"));
        c.setAttribute("data-ru", "Показано: " + list.length);
        renderChips();
        Agora.localize();
      }

      // Published-by multi-row
      function pubRow(val) {
        return '<div class="pub-row"><input class="input js-pub" value="' + Agora.esc(val || "") +
          '" data-en-ph="Username" data-ru-ph="Имя пользователя">' +
          '<button class="icon-btn icon-btn--bordered" data-pub-remove data-en-aria="Remove row" data-ru-aria="Удалить строку" data-icon="x"></button></div>';
      }
      var pubWrap = document.getElementById("pub-rows");
      pubWrap.innerHTML = pubRow("");
      pubWrap.addEventListener("input", function (e) {
        if (!e.target.classList.contains("js-pub")) return;
        var rows = pubWrap.querySelectorAll(".pub-row");
        var last = rows[rows.length - 1];
        if (last.contains(e.target) && e.target.value.trim()) {
          pubWrap.insertAdjacentHTML("beforeend", pubRow(""));
          Agora.localize();
        }
      });
      pubWrap.addEventListener("click", function (e) {
        var rm = e.target.closest("[data-pub-remove]");
        if (rm) {
          var rows = pubWrap.querySelectorAll(".pub-row");
          if (rows.length > 1) rm.closest(".pub-row").remove();
          else rm.closest(".pub-row").querySelector(".js-pub").value = "";
        }
      });

      // Search
      document.getElementById("debate-search").addEventListener("input", function (e) {
        state.query = e.target.value; render();
      });

      // Sort
      document.querySelectorAll("[data-sort]").forEach(function (b) {
        b.addEventListener("click", function () {
          state.sort = b.getAttribute("data-sort");
          document.querySelectorAll("[data-sort]").forEach(function (x) { x.setAttribute("aria-checked", String(x === b)); });
          var lbl = document.getElementById("sort-label");
          var span = b.querySelector("span");
          lbl.setAttribute("data-en", span.getAttribute("data-en"));
          lbl.setAttribute("data-ru", span.getAttribute("data-ru"));
          var menu = b.closest(".dropdown__menu"); if (menu) menu.hidden = true;
          render();
        });
      });

      // Apply / clear
      document.getElementById("apply-filters").addEventListener("click", function () {
        state.statuses = Array.prototype.map.call(document.querySelectorAll(".js-status:checked"), function (x) { return x.value; });
        state.publishedBy = Array.prototype.map.call(pubWrap.querySelectorAll(".js-pub"), function (x) { return x.value.trim(); }).filter(Boolean);
        document.getElementById("filters-panel").hidden = true;
        render();
      });
      document.getElementById("clear-filters").addEventListener("click", function () {
        state.statuses = []; state.publishedBy = [];
        document.querySelectorAll(".js-status").forEach(function (x) { x.checked = false; });
        pubWrap.innerHTML = pubRow(""); Agora.localize();
        render();
      });

      // Chip removal (delegated on document via applied-filters)
      document.getElementById("filter-chips").addEventListener("click", function (e) {
        var s = e.target.closest("[data-chip-status]"), p = e.target.closest("[data-chip-pub]");
        if (s) {
          var v = s.getAttribute("data-chip-status");
          state.statuses = state.statuses.filter(function (x) { return x !== v; });
          var cb = document.querySelector('.js-status[value="' + v + '"]'); if (cb) cb.checked = false;
          render();
        } else if (p) {
          var pv = p.getAttribute("data-chip-pub");
          state.publishedBy = state.publishedBy.filter(function (x) { return x !== pv; });
          render();
        }
      });

      render();
    };
  </script>
  <script src="assets/js/app.js"></script>
</body>
</html>
